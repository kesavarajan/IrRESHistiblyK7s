<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reshma &amp; Kesavarajan — The Wedding Invite</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:#f0e7d6;}
  /* pan-x/pan-y + pinch-zoom: at scale 1 the page has nothing to pan so a
     one-finger drag reaches our flip handler; once zoomed in, the browser
     takes the drag to pan the magnified page instead */
  body{touch-action:pan-x pan-y pinch-zoom;overscroll-behavior:none;-webkit-user-select:none;user-select:none;}
  /* only the book layers are full-screen fixed — NOT the maze canvas */
  #c,#coil{display:block;position:fixed;inset:0;}
  #c{z-index:0;}
  /* native <img> shown when idle — browser image rendering is sharper than
     canvas compositing on phones with fractional devicePixelRatio */
  #flat{position:fixed;display:none;pointer-events:none;z-index:1;}
  #coil{position:fixed;inset:0;pointer-events:none;z-index:2;}
  /* back-to-invitation button */
  #back{position:fixed;top:12px;left:12px;z-index:5;display:inline-flex;align-items:center;gap:6px;
    padding:8px 14px 8px 11px;border-radius:22px;text-decoration:none;
    font-family:Georgia,'Times New Roman',serif;font-size:13px;letter-spacing:.03em;
    color:#4a3f2e;background:rgba(251,246,234,.82);border:1px solid #d8c9a8;
    box-shadow:0 4px 14px -6px rgba(80,60,30,.5);backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);}
  #back svg{width:15px;height:15px;}
  #back:active{background:#f0e6d0;}

  /* ---- wedding maze popup ---- */
  /* flex + margin:auto on the card centers it when it fits and lets the modal
     scroll (top-anchored) when it doesn't, so the maze title is never clipped */
  #mazeModal{position:fixed;inset:0;z-index:10;display:none;justify-content:center;
    overflow-y:auto;padding:10px;background:rgba(70,56,34,.5);}
  #mazeModal.open{display:flex;}
  /* card hugs the board (width:max-content) so it's always centred, never wider than the screen */
  .mazeCard{position:relative;margin:auto;background:#fbf6ea;border:1px solid #d8c9a8;border-radius:14px;
    padding:14px 12px 12px;width:max-content;max-width:96vw;text-align:center;color:#4a3f2e;
    font-family:Georgia,'Times New Roman',serif;
    box-shadow:0 24px 60px -18px rgba(80,60,30,.6);}
  .mazeCard h2{font-size:20px;letter-spacing:.04em;margin-bottom:2px;color:#3c5a3c;}
  .mazeCard p{font-size:12px;opacity:.75;margin-bottom:10px;}
  /* board size is set in px by JS (fits the viewport); max-width is a safety net */
  #mazeCv{display:block;margin:0 auto;max-width:100%;
    border:2px solid #3c5a3c;border-radius:8px;background:#fdfaf1;touch-action:none;}
  #mazeStatus{min-height:22px;font-size:14px;margin-top:8px;color:#3c5a3c;}
  #mazeClose{position:absolute;top:8px;right:10px;width:32px;height:32px;border:none;
    background:none;font-size:20px;color:#8a7449;cursor:pointer;line-height:1;}
  #mazeReset{margin-top:6px;padding:7px 22px;border:1px solid #b39a67;border-radius:20px;
    background:none;color:#8a7449;font-family:inherit;font-size:13px;letter-spacing:.08em;cursor:pointer;}
  #mazeReset:active{background:#f0e6d0;}

  /* ---- word-search popup ---- */
  #cwModal{position:fixed;inset:0;z-index:10;display:none;justify-content:center;
    overflow-y:auto;padding:10px;background:rgba(70,56,34,.5);}
  #cwModal.open{display:flex;}
  .cwCard{position:relative;margin:auto;background:#fbf6ea;border:1px solid #d8c9a8;border-radius:14px;
    padding:16px 14px 12px;width:max-content;max-width:96vw;text-align:center;color:#4a3f2e;
    font-family:Georgia,'Times New Roman',serif;box-shadow:0 24px 60px -18px rgba(80,60,30,.6);}
  .cwCard h2{font-size:17px;letter-spacing:.06em;text-transform:lowercase;color:#5a4a7a;margin-bottom:2px;}
  .cwCard p{font-size:12px;opacity:.7;margin-bottom:10px;}
  #cwCv{display:block;margin:0 auto;touch-action:none;border:1px solid #e0d6c0;border-radius:6px;background:#fdfaf1;}
  #cwWords{display:flex;flex-wrap:wrap;justify-content:center;gap:4px 12px;margin-top:12px;max-width:340px;}
  #cwWords span{font-size:12px;letter-spacing:.06em;color:#5a4a7a;transition:color .2s;}
  #cwWords span.done{color:#a7b09a;text-decoration:line-through;}
  #cwStatus{min-height:20px;font-size:13px;margin-top:8px;color:#6f51a0;}
  #cwClose{position:absolute;top:8px;right:10px;width:32px;height:32px;border:none;
    background:none;font-size:20px;color:#8a7449;cursor:pointer;line-height:1;}
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <img id="flat" alt="" draggable="false">
  <canvas id="coil"></canvas>

  <a id="back" href="index.html" aria-label="Back to invitation">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    Invitation
  </a>

  <div id="mazeModal">
    <div class="mazeCard">
      <button id="mazeClose" aria-label="Close">&#10005;</button>
      <canvas id="mazeCv"></canvas>
      <div id="mazeStatus"></div>
      <button id="mazeReset">Restart</button>
    </div>
  </div>

  <div id="cwModal">
    <div class="cwCard">
      <button id="cwClose" aria-label="Close">&#10005;</button>
      <h2>crosswords</h2>
      <p>Drag across the letters to find each hidden word</p>
      <canvas id="cwCv"></canvas>
      <div id="cwWords"></div>
      <div id="cwStatus"></div>
    </div>
  </div>

<script>
  // ?v= busts stale mobile caches when the images are re-rendered
  const SRC = [
    'book-pages/page-1.jpg?v=3',
    'book-pages/page-2.jpg?v=3',
    'book-pages/page-3.jpg?v=3',
    'book-pages/page-4.jpg?v=3'
  ];
  const AR = 2191 / 1574;          // page height / width

  const cv  = document.getElementById('c');
  const ctx = cv.getContext('2d');

  // ---- load pages ----
  const imgs = [];
  let loaded = 0;
  SRC.forEach((s, i) => {
    const im = new Image();
    im.onload = () => { loaded++; buildScaled(); if (i === current) staticDraw(); };
    im.src = s;
    imgs[i] = im;
  });

  // pre-scale each page to display resolution with stepped high-quality
  // resampling — drawing the full-size jpegs directly blurs them
  const scaled = [];
  function buildScaled(){
    if (!pr) return;
    const tw = Math.round(pr.w * kx), th = Math.round(pr.h * ky);
    imgs.forEach((im, i) => {
      if (!im.complete || !im.naturalWidth) return;
      if (scaled[i] && scaled[i].width === tw) return;
      let sw = im.naturalWidth, sh = im.naturalHeight, src = im;
      while (sw / 2 > tw){                       // halve until close to target
        sw = Math.round(sw / 2); sh = Math.round(sh / 2);
        const c = document.createElement('canvas');
        c.width = sw; c.height = sh;
        const cc = c.getContext('2d');
        cc.imageSmoothingQuality = 'high';
        cc.drawImage(src, 0, 0, sw, sh);
        src = c;
      }
      const c = document.createElement('canvas');
      c.width = tw; c.height = th;
      const cc = c.getContext('2d');
      cc.imageSmoothingQuality = 'high';
      cc.drawImage(src, 0, 0, tw, th);
      scaled[i] = c;
    });
  }

  const flat   = document.getElementById('flat');
  const coilCv = document.getElementById('coil');
  const coilCx = coilCv.getContext('2d');

  let W, H, dpr, kx, ky, pr;       // pr = page rectangle {x,y,w,h}
  function resize(){
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth; H = window.innerHeight;
    // integer backing store + exact effective scale — a fractional dpr like
    // 2.625 otherwise misaligns the whole canvas by a sub-pixel and blurs it
    cv.width = coilCv.width = Math.round(W * dpr);
    cv.height = coilCv.height = Math.round(H * dpr);
    kx = cv.width / W; ky = cv.height / H;
    cv.style.width = coilCv.style.width = W + 'px';
    cv.style.height = coilCv.style.height = H + 'px';
    ctx.setTransform(kx, 0, 0, ky, 0, 0);
    coilCx.setTransform(kx, 0, 0, ky, 0, 0);
    let w = W - 44, h = w * AR;                   // margin for binding coils + page edges
    if (h > H - 34){ h = H - 34; w = h / AR; }
    // snap the page rect to whole device pixels
    w = Math.round(w * kx) / kx; h = Math.round(h * ky) / ky;
    pr = { x: Math.round((W - w) / 2 * kx) / kx, y: Math.round((H - h) / 2 * ky) / ky, w, h };
    // idle <img> sits exactly on the page rect
    flat.style.left = pr.x + 'px'; flat.style.top = pr.y + 'px';
    flat.style.width = pr.w + 'px'; flat.style.height = pr.h + 'px';
    ctx.imageSmoothingQuality = 'high';
    buildScaled();
    if (!anim) staticDraw();
  }

  let flatShown = false;
  function showFlat(){
    if (flat.src !== new URL(SRC[current], location).href) flat.src = SRC[current];
    flat.style.display = 'block'; flatShown = true;
    coilCx.clearRect(0, 0, W, H);
    drawBinding(coilCx);                          // coils overlay the idle page
  }
  function hideFlat(){
    if (!flatShown) return;
    flat.style.display = 'none'; flatShown = false;
    coilCx.clearRect(0, 0, W, H);
  }

  // ---- pulsing hints over the playable areas (maze p2, word-search p4) ----
  const HINTS = [
    { page: 1, x0: 0.5935, y0: 0.4667, x1: 0.9454, y1: 0.785 },   // maze card border
    { page: 3, x0: 0.0908, y0: 0.1515, x1: 0.4844, y1: 0.457 }    // word-search grid
  ];
  let hintDrawn = false;
  const rrp = (g, x, y, w, h, r) => { g.beginPath(); g.roundRect ? g.roundRect(x, y, w, h, r) : g.rect(x, y, w, h); };
  function hintLoop(now){
    const h = HINTS.find(v => v.page === current);
    const active = flatShown && h && !anim && !mazeOpen && !cwOpen;
    if (active){
      coilCx.clearRect(0, 0, W, H);
      drawBinding(coilCx);
      const pulse = 0.5 + 0.5 * Math.sin(now / 480);
      const x = pr.x + pr.w * h.x0, y = pr.y + pr.h * h.y0,
            w = pr.w * (h.x1 - h.x0), ht = pr.h * (h.y1 - h.y0), grow = pulse * 1.5;
      coilCx.save();
      coilCx.strokeStyle = `rgba(60,90,60,${0.30 + 0.55 * pulse})`;
      coilCx.lineWidth = 1.2 + pulse * 1.3;
      rrp(coilCx, x - grow, y - grow, w + grow * 2, ht + grow * 2, 6); coilCx.stroke();
      coilCx.restore();
      hintDrawn = true;
    } else if (hintDrawn){                          // clear the hint, keep the coils
      hintDrawn = false;
      if (flatShown){ coilCx.clearRect(0, 0, W, H); drawBinding(coilCx); }
    }
    requestAnimationFrame(hintLoop);
  }

  const drawPage = (im, r) => {
    const s = scaled[imgs.indexOf(im)];
    if (s) ctx.drawImage(s, r.x, r.y, r.w, r.h);
    else if (im && im.complete) ctx.drawImage(im, r.x, r.y, r.w, r.h);
  };

  // ---- table + book-block backdrop that fills the letterbox space ----
  const rr = (x, y, w, h, r) => { ctx.beginPath(); ctx.roundRect ? ctx.roundRect(x, y, w, h, r) : ctx.rect(x, y, w, h); };
  function drawBackdrop(){
    // soft ivory / champagne backdrop
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#fbf6ea'); g.addColorStop(.5, '#f2e9d7'); g.addColorStop(1, '#e6d9c0');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    // gentle warm vignette
    const v = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*.4, W/2, H/2, Math.max(W,H)*.85);
    v.addColorStop(0, 'rgba(140,115,70,0)'); v.addColorStop(1, 'rgba(140,115,70,.16)');
    ctx.fillStyle = v; ctx.fillRect(0, 0, W, H);
    // drop shadow under the book block
    const n = 6;                                  // visible stacked sheets
    ctx.save();
    ctx.shadowColor = 'rgba(110,90,55,.38)'; ctx.shadowBlur = 24; ctx.shadowOffsetY = 9;
    ctx.fillStyle = '#efe5cf';
    rr(pr.x - 2, pr.y - n*1.5 - 3, pr.w + n*1.6 + 4, pr.h + n*3 + 6, 5); ctx.fill();
    ctx.restore();
    // stacked sheets: bound at the left edge, fanning slightly right/top/bottom
    for (let i = n; i >= 1; i--){
      ctx.fillStyle = i % 2 ? '#ddd0b0' : '#ece1c9';
      rr(pr.x, pr.y - i*1.5, pr.w + i*1.6, pr.h + i*3, 4); ctx.fill();
    }
  }

  // spiral binding coils along the left edge (drawn on the given context)
  function drawBinding(g){
    g = g || ctx;
    const count = Math.max(8, Math.round(pr.h / 76));
    const gap = pr.h / count;
    for (let i = 0; i < count; i++){
      const y = pr.y + gap * (i + .5);
      // punched hole in the sheets
      g.fillStyle = 'rgba(70,55,30,.42)';
      g.beginPath(); g.ellipse(pr.x + 11, y, 3.4, 3.6, 0, 0, Math.PI * 2); g.fill();
      // antique-gold coil passing through the hole
      const x0 = pr.x - 13, x1 = pr.x + 13;
      const mg = g.createLinearGradient(0, y - 6, 0, y + 6);
      mg.addColorStop(0, '#e8d6ae'); mg.addColorStop(.45, '#b39a67');
      mg.addColorStop(.6, '#8a7449'); mg.addColorStop(1, '#57482c');
      g.strokeStyle = mg; g.lineWidth = 4.6; g.lineCap = 'round';
      g.beginPath();
      g.moveTo(x0, y + 4);
      g.quadraticCurveTo((x0 + x1) / 2, y - 7, x1, y - 1.5);
      g.stroke();
      // thin highlight on top of the coil
      g.strokeStyle = 'rgba(255,250,235,.4)'; g.lineWidth = 1.3;
      g.beginPath();
      g.moveTo(x0, y + 3);
      g.quadraticCurveTo((x0 + x1) / 2, y - 8, x1, y - 2.6);
      g.stroke();
    }
  }

  // ---- geometry helpers for the fold ----
  const side = (p, M, n) => (p.x - M.x) * n.x + (p.y - M.y) * n.y;        // signed distance to fold line
  const reflectPt = (p, M, n) => { const d = 2 * side(p, M, n); return { x: p.x - d * n.x, y: p.y - d * n.y }; };
  function reflMat(M, n){                                                 // affine reflection across the line (M,n)
    const k = 2 * (n.x * M.x + n.y * M.y);
    return { a: 1 - 2*n.x*n.x, b: -2*n.x*n.y, c: -2*n.x*n.y, d: 1 - 2*n.y*n.y, e: k*n.x, f: k*n.y };
  }
  function clipHalf(poly, M, n, keepPos){                                 // Sutherland–Hodgman against a half-plane
    const out = [], s = keepPos ? 1 : -1;
    for (let i = 0; i < poly.length; i++){
      const A = poly[i], B = poly[(i+1) % poly.length];
      const sa = side(A, M, n) * s, sb = side(B, M, n) * s;
      if (sa >= 0) out.push(A);
      if ((sa >= 0) !== (sb >= 0)){ const t = sa / (sa - sb); out.push({ x: A.x + (B.x-A.x)*t, y: A.y + (B.y-A.y)*t }); }
    }
    return out;
  }
  const pathPoly = (poly) => { ctx.beginPath(); poly.forEach((p,i) => i ? ctx.lineTo(p.x,p.y) : ctx.moveTo(p.x,p.y)); ctx.closePath(); };

  // ---- one frame of the curl ----
  // C = the grabbed page point (fixed), F = where it is being dragged to.
  // The sheet folds along the perpendicular bisector of C→F, so grabbing a
  // corner peels a diagonal triangle and grabbing mid-edge peels the whole side.
  function render(C, F, front, reveal){
    hideFlat();                                   // canvas takes over during a turn
    ctx.setTransform(kx, 0, 0, ky, 0, 0);
    ctx.clearRect(0, 0, W, H);
    drawBackdrop();

    const dvx = F.x - C.x, dvy = F.y - C.y, len = Math.hypot(dvx, dvy);
    if (len < 1){ drawPage(front, pr); drawBinding(); return; }   // no fold yet — flat page

    const n = { x: dvx/len, y: dvy/len };
    const M = { x: (C.x+F.x)/2, y: (C.y+F.y)/2 };
    const corners = [
      { x: pr.x, y: pr.y }, { x: pr.x+pr.w, y: pr.y },
      { x: pr.x+pr.w, y: pr.y+pr.h }, { x: pr.x, y: pr.y+pr.h }
    ];
    const cs   = side(C, M, n) >= 0;                          // half-plane containing the grabbed side
    const flip = clipHalf(corners, M, n, cs);                 // part that folds over
    const flat = clipHalf(corners, M, n, !cs);                // part still lying flat

    // 1) the page revealed underneath the lift
    drawPage(reveal, pr);

    // 2) the still-flat remainder of the turning page
    if (flat.length > 2){
      ctx.save();
      pathPoly(flat); ctx.clip();
      drawPage(front, pr);
      const g = ctx.createLinearGradient(M.x - n.x*pr.w*0.16, M.y - n.y*pr.w*0.16, M.x, M.y);
      g.addColorStop(0, 'rgba(40,28,10,0)'); g.addColorStop(1, 'rgba(40,28,10,0.12)');
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }

    // binding coils sit under the lifted flap so a turning page passes over them
    drawBinding();

    // 3) the folded flap = reflection of the grabbed corner (back of the sheet)
    if (flip.length > 2){
      const R = reflMat(M, n);
      ctx.save();
      ctx.setTransform(kx, 0, 0, ky, 0, 0);
      ctx.transform(R.a, R.b, R.c, R.d, R.e, R.f);            // draw everything mirrored across the fold
      pathPoly(flip); ctx.clip();
      ctx.fillStyle = '#f4ecda';
      ctx.fillRect(pr.x - pr.w, pr.y - pr.h, pr.w*3, pr.h*3); // opaque warm paper
      ctx.globalAlpha = 0.18; drawPage(front, pr); ctx.globalAlpha = 1;  // faint reversed print
      ctx.restore();

      // shading over the flap (screen space): highlight at the crease, shadow at the lifted edge
      const rflip = flip.map(p => reflectPt(p, M, n));
      ctx.save();
      ctx.setTransform(kx, 0, 0, ky, 0, 0);
      pathPoly(rflip); ctx.clip();
      const g = ctx.createLinearGradient(M.x, M.y, F.x, F.y);
      g.addColorStop(0.00, 'rgba(255,250,238,0.55)');
      g.addColorStop(0.16, 'rgba(255,250,238,0.14)');
      g.addColorStop(0.62, 'rgba(40,28,10,0.05)');
      g.addColorStop(1.00, 'rgba(40,28,10,0.30)');
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }
  }

  function staticDraw(){
    if (!pr) return;
    ctx.setTransform(kx, 0, 0, ky, 0, 0);
    ctx.clearRect(0, 0, W, H);
    drawBackdrop();
    drawPage(imgs[current], pr);
    drawBinding();
    showFlat();                                   // idle page = native <img> on top
  }

  // ---- turn animation ----
  let current = 0;
  let anim = null;
  let drag = null;
  const DUR = 780;
  const THRESH = 8;                                   // px before a drag commits to a direction
  const ease = t => t < .5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2;

  // animate the grabbed point from F0 -> F1 (C fixed), then run onDone
  function animateFold(C, F0, F1, front, reveal, onDone){
    if (anim) cancelAnimationFrame(anim);
    const dist = Math.hypot(F1.x - F0.x, F1.y - F0.y);
    const dur = Math.max(150, Math.min(DUR, DUR * dist / (2 * pr.w)));
    const t0 = performance.now();
    anim = requestAnimationFrame(function step(now){
      let t = (now - t0) / dur; if (t >= 1) t = 1;
      const e = ease(t);
      render(C, { x: F0.x + (F1.x - F0.x) * e, y: F0.y + (F1.y - F0.y) * e }, front, reveal);
      if (t < 1){ anim = requestAnimationFrame(step); }
      else { anim = null; onDone && onDone(); }
    });
  }

  // a page always folds toward the left; "fully turned" puts the grabbed
  // right-edge point at the mirrored position past the left edge.
  const foldedF = cy => ({ x: pr.x - pr.w, y: cy });

  function turn(dir){
    if (anim || drag) return;
    if (dir > 0 && current >= SRC.length - 1) return;
    if (dir < 0 && current <= 0) return;
    const midY = pr.y + pr.h / 2;
    const front  = dir > 0 ? imgs[current]     : imgs[current - 1];
    const reveal = dir > 0 ? imgs[current + 1] : imgs[current];
    const C = { x: pr.x + pr.w, y: midY };
    if (dir > 0)   // peel current page away to the left
      animateFold(C, { x: C.x, y: C.y }, foldedF(midY), front, reveal,
                  () => { current++; staticDraw(); });
    else           // un-peel the previous page back from the left
      animateFold(C, foldedF(midY), { x: C.x, y: C.y }, front, reveal,
                  () => { current--; staticDraw(); });
  }
  const next = () => turn(1);
  const prev = () => turn(-1);

  // ---- finger-follow dragging (corner-aware) ----
  const zoomed = () => window.visualViewport && window.visualViewport.scale > 1.01;
  cv.addEventListener('pointerdown', e => {
    if (anim || zoomed()) return;                  // when zoomed in, let the browser pan
    try { cv.setPointerCapture(e.pointerId); } catch(_){}
    drag = { sx: e.clientX, sy: e.clientY, committed: false, moved: false };
  });

  cv.addEventListener('pointermove', e => {
    if (!drag) return;
    const dx = e.clientX - drag.sx, dy = e.clientY - drag.sy;

    if (!drag.committed){
      if (Math.abs(dx) < THRESH || Math.abs(dx) <= Math.abs(dy)) return;  // wait for a clear horizontal intent
      const dir = dx < 0 ? 1 : -1;
      if ((dir > 0 && current >= SRC.length - 1) || (dir < 0 && current <= 0)){ drag = null; return; }
      // anchor point: snap to the nearest corner if grabbed near top/bottom, else follow the edge
      let cy;
      if (drag.sy < pr.y + pr.h * 0.30)      cy = pr.y;             // top corner
      else if (drag.sy > pr.y + pr.h * 0.70) cy = pr.y + pr.h;      // bottom corner
      else cy = Math.min(Math.max(drag.sy, pr.y), pr.y + pr.h);     // mid-edge
      drag.committed = true;
      drag.dir    = dir;
      drag.C      = { x: pr.x + pr.w, y: cy };                      // grabbed edge point (always right edge)
      drag.F0     = dir > 0 ? { x: drag.C.x, y: cy } : foldedF(cy); // finger start: flat, or fully turned
      drag.front  = dir > 0 ? imgs[current]     : imgs[current - 1];
      drag.reveal = dir > 0 ? imgs[current + 1] : imgs[current];
    }
    drag.moved = true;
    // the grabbed corner follows the finger, clamped between flat and fully turned
    const fx = Math.max(pr.x - pr.w, Math.min(drag.F0.x + dx, drag.C.x));
    drag.F = { x: fx, y: drag.F0.y + dy };
    render(drag.C, drag.F, drag.front, drag.reveal);
  });

  function endDrag(e){
    if (!drag) return;
    const d = drag; drag = null;
    const dx = e.clientX - d.sx, dy = e.clientY - d.sy;

    if (!d.committed){
      if (Math.abs(dx) < THRESH && Math.abs(dy) < THRESH){          // a tap — only hotspots, no page flip
        tapHotspot(e.clientX, e.clientY);
      } else if (Math.abs(dy) > 40 && Math.abs(dy) > Math.abs(dx)){ // vertical flick still turns
        (dy < 0) ? next() : prev();
      }
      return;
    }
    // released mid-turn: complete if dragged past ~a third, else spring back
    const progress = Math.abs(d.F.x - d.F0.x) / (2 * pr.w);
    if (progress > 0.30){
      // finish the gesture: forward -> fully folded, backward -> flat again
      const target = d.dir > 0 ? foldedF(d.C.y) : { x: d.C.x, y: d.C.y };
      animateFold(d.C, d.F, target, d.front, d.reveal,
                  () => { current += d.dir; staticDraw(); });
    } else {
      animateFold(d.C, d.F, d.F0, d.front, d.reveal, staticDraw);
    }
  }
  cv.addEventListener('pointerup', endDrag);
  cv.addEventListener('pointercancel', endDrag);

  // ---- wheel / keys (desktop) ----
  let wlock = false;
  cv.addEventListener('wheel', e => {
    if (wlock) return;
    const d = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
    if (Math.abs(d) < 10) return;
    wlock = true; (d > 0 ? next() : prev());
    setTimeout(() => wlock = false, DUR + 40);
  }, {passive:true});

  window.addEventListener('keydown', e => {
    if (mazeOpen){                                   // arrows drive the maze while it's open
      const mv = { ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0] }[e.key];
      if (mv){ e.preventDefault(); mazeStep(mv[0], mv[1]); }
      if (e.key === 'Escape') closeMaze();
      return;
    }
    if (cwOpen){ if (e.key === 'Escape') closeCrossword(); return; }
    if (['ArrowRight','ArrowDown','PageDown',' '].includes(e.key)){ e.preventDefault(); next(); }
    if (['ArrowLeft','ArrowUp','PageUp'].includes(e.key)) prev();
  });

  window.addEventListener('resize', () => {
    resize();
    if (mazeOpen) newMaze();
    if (cwOpen) newCrossword();
  });
  resize();
  requestAnimationFrame(hintLoop);

  // =====================================================================
  //  WEDDING MAZE — tap the maze card on page 2 to play
  // =====================================================================
  const HOTSPOTS = [
    { page: 1, x0: .55, y0: .43, x1: 1,   y1: .85, action: openMaze },       // maze card on page-2
    { page: 3, x0: .02, y0: .10, x1: .56, y1: .50, action: openCrossword }   // word-search on page-4
  ];
  function tapHotspot(x, y){
    if (anim) return false;
    const fx = (x - pr.x) / pr.w, fy = (y - pr.y) / pr.h;
    for (const h of HOTSPOTS){
      if (current === h.page && fx >= h.x0 && fx <= h.x1 && fy >= h.y0 && fy <= h.y1){
        h.action(); return true;
      }
    }
    return false;
  }

  const modal   = document.getElementById('mazeModal');
  const mcv     = document.getElementById('mazeCv');
  const mctx    = mcv.getContext('2d');
  const statusE = document.getElementById('mazeStatus');
  let mazeOpen = false, MZ = null;                   // MZ = current game state

  // the exact maze traced from book-pages/new_maze.png (17×18 grid)
  // wall bits: 1 top, 2 right, 4 bottom, 8 left
  const MWALLS = [[0,0,0,0,0,5,5,3,13,5,3,9,5,1,3,13,5],[0,0,0,0,2,9,3,8,5,1,6,14,9,6,8,5,5],[0,0,0,0,2,10,10,10,11,10,9,5,4,7,8,5,7],[0,4,0,0,2,10,10,10,10,10,10,13,5,1,2,9,1],[8,3,8,4,6,10,10,10,10,10,12,1,7,10,10,12,4],[14,10,8,5,5,2,12,4,4,0,3,10,9,6,12,7,11],[9,2,10,9,1,2,13,5,5,4,4,2,10,11,13,1,2],[12,4,4,4,2,10,9,5,7,11,9,2,10,8,7,10,8],[9,5,5,3,10,10,12,1,5,2,10,14,12,2,13,6,10],[14,9,3,10,10,10,11,12,7,10,12,5,3,8,1,5,6],[9,2,10,8,0,2,10,9,1,0,1,3,8,2,10,9,3],[10,10,8,4,4,4,2,8,6,8,0,2,10,8,6,10,10],[10,10,12,5,5,3,8,2,9,4,4,4,4,4,5,6,14],[14,10,9,5,3,12,6,10,8,5,5,7,13,1,1,1,1],[9,6,10,11,10,13,1,2,10,13,5,1,1,0,0,0,0],[12,5,6,10,12,5,2,10,12,5,7,10,10,8,0,0,0],[9,3,9,4,5,5,2,8,1,1,5,4,2,8,0,0,0],[14,12,6,13,5,5,6,12,6,12,5,7,14,8,0,0,0]];
  // photo plaza cells (groom top-left, bride bottom-right) — not walkable
  const MBLOCK = [15,15,15,15,0,0,0,0,0,0,0,0,0,114688,114688,114688,114688,114688];
  const MNX = 17, MNY = 18;
  const MSTART = { x: 2, y: 4 };                      // just below the groom
  const MGOALS = new Set(['14,12','15,12','16,12','13,13','13,14','13,15','13,16','13,17']);
  // board geometry: maze grid inside book-pages/new_maze.png
  const MIMG = { w: 477, h: 600, ox: 17, oy: 129, px: 24.588, py: 24.722 };
  const boardImg = new Image();
  boardImg.src = 'book-pages/new_maze.png';
  boardImg.onload = () => { if (mazeOpen) drawMaze(); };

  const mBlocked = (x, y) => (MBLOCK[y] >> x) & 1;

  function newMaze(){
    // pick a board size that fits the viewport (width and height), leaving room
    // for the close button, status line and Restart button; the card hugs it
    const vw = (window.visualViewport && window.visualViewport.width)  || window.innerWidth;
    const vh = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
    const dp = window.devicePixelRatio || 1;
    const cssw = Math.min(vw * .9 - 28, 340, (vh - 150) * MIMG.w / MIMG.h);
    const cssh = cssw * MIMG.h / MIMG.w;
    mcv.style.width = cssw + 'px'; mcv.style.height = cssh + 'px';
    mcv.width = Math.round(cssw * dp); mcv.height = Math.round(cssh * dp);
    mctx.setTransform(dp, 0, 0, dp, 0, 0);
    mctx.imageSmoothingQuality = 'high';
    MZ = { cw: cssw, ch: cssh, px: MSTART.x, py: MSTART.y, won: false };
    statusE.textContent = '';
    drawMaze();
  }

  // cell centre in canvas coords
  const mCell = (cx, cy) => ({
    x: (MIMG.ox + (cx + .5) * MIMG.px) * MZ.cw / MIMG.w,
    y: (MIMG.oy + (cy + .5) * MIMG.py) * MZ.ch / MIMG.h
  });

  function drawMaze(){
    if (!MZ) return;
    mctx.clearRect(0, 0, MZ.cw, MZ.ch);
    if (boardImg.complete) mctx.drawImage(boardImg, 0, 0, MZ.cw, MZ.ch);
    // the ring travelling from groom to bride
    const fs = Math.floor(MZ.cw / MNX * 1.05);
    mctx.font = `${fs}px serif`;
    mctx.textAlign = 'center'; mctx.textBaseline = 'middle';
    if (MZ.won){
      const b = mCell(14.5, 13.5);
      mctx.font = `${fs*1.8}px serif`;
      mctx.fillText('\u{1F495}', b.x, b.y - fs*1.6);
    } else {
      const p = mCell(MZ.px, MZ.py);
      mctx.fillText('\u{1F48D}', p.x, p.y + 1);
    }
  }

  const mazeCan = (x, y, mx, my) => {
    const w = MWALLS[y][x];
    return mx === 1 ? !(w & 2) : mx === -1 ? !(w & 8)
         : my === 1 ? !(w & 4) : !(w & 1);
  };
  function mazeStep(mx, my){
    if (!MZ || MZ.won) return;
    const nx = MZ.px + mx, ny = MZ.py + my;
    if (nx < 0 || ny < 0 || nx >= MNX || ny >= MNY) return;
    if (mBlocked(nx, ny) || !mazeCan(MZ.px, MZ.py, mx, my)) return;
    MZ.px = nx; MZ.py = ny;
    if (MGOALS.has(nx + ',' + ny)){
      MZ.won = true;
      statusE.textContent = 'He made it to the wedding! \u{1F48D} 31 Aug 2026';
    }
    drawMaze();
  }

  // drag the ring along the corridors with a finger
  let mdrag = false;
  function mazePoint(e){
    const r = mcv.getBoundingClientRect();
    // pointer position in cell coordinates
    const ix = (e.clientX - r.left) * MIMG.w / MZ.cw;
    const iy = (e.clientY - r.top) * MIMG.h / MZ.ch;
    return { x: (ix - MIMG.ox) / MIMG.px, y: (iy - MIMG.oy) / MIMG.py };
  }
  function mazeFollow(e){
    if (!MZ || MZ.won) return;
    const p = mazePoint(e);
    for (let k = 0; k < 3; k++){                       // walk up to 3 cells toward the finger
      const dx = p.x - (MZ.px + .5), dy = p.y - (MZ.py + .5);
      if (Math.hypot(dx, dy) < .65) break;
      const tries = Math.abs(dx) > Math.abs(dy)
        ? [[Math.sign(dx),0],[0,Math.sign(dy)]]
        : [[0,Math.sign(dy)],[Math.sign(dx),0]];
      let moved = false;
      for (const [mx,my] of tries){
        if ((mx || my) && mazeCan(MZ.px, MZ.py, mx, my)){
          const before = MZ.px + ',' + MZ.py;
          mazeStep(mx, my);
          if (MZ.px + ',' + MZ.py !== before){ moved = true; break; }
        }
      }
      if (!moved) break;
    }
  }
  mcv.addEventListener('pointerdown', e => { mdrag = true; try{ mcv.setPointerCapture(e.pointerId); }catch(_){} mazeFollow(e); });
  mcv.addEventListener('pointermove', e => { if (mdrag) mazeFollow(e); });
  mcv.addEventListener('pointerup',   () => mdrag = false);
  mcv.addEventListener('pointercancel', () => mdrag = false);

  function openMaze(){ mazeOpen = true; modal.classList.add('open'); newMaze(); }
  function closeMaze(){ mazeOpen = false; modal.classList.remove('open'); }
  document.getElementById('mazeClose').addEventListener('click', closeMaze);
  document.getElementById('mazeReset').addEventListener('click', newMaze);
  modal.addEventListener('click', e => { if (e.target === modal) closeMaze(); });

  // =====================================================================
  //  WORD SEARCH ("crosswords") — tap the grid on page 4 to play
  // =====================================================================
  const CW_GRID = [
    "RQWERTYUIOPL","RESHUASDFKHJ","ZXCVBNMQWERT","LOVEYUIOPSSD","FGHJKLZXCABN",
    "FAMILYQWEVTY","UIOPASDFGHJK","BLESSINGSZXC","VCVBNMQWERTF","HAPPINESSUIR",
    "QWEDDINGASDI","ASDFGHJKLZXE","FOREVERVBNQN","ZXCVBNQWERTD","DESTINYZXCVS"
  ];
  // [word, startRow, startCol, dRow, dCol]
  const CW_WORDS = [
    ["RESHU",1,0,0,1], ["KESAV",1,9,1,0], ["LOVE",3,0,0,1], ["FAMILY",5,0,0,1],
    ["DESTINY",14,0,0,1], ["HAPPINESS",9,0,0,1], ["BLESSING",7,0,0,1],
    ["FOREVER",12,0,0,1], ["FRIENDS",8,11,1,0], ["WEDDING",10,1,0,1]
  ];
  const CWR = CW_GRID.length, CWC = CW_GRID[0].length;

  const cwModal = document.getElementById('cwModal');
  const cwcv    = document.getElementById('cwCv');
  const cwx     = cwcv.getContext('2d');
  const cwWordsE= document.getElementById('cwWords');
  const cwStatusE = document.getElementById('cwStatus');
  let cwOpen = false, CWG = null, cwSel = null;
  const cwFound = new Set();

  const cwWordKey = e => {                            // sorted "r,c" cells of a word
    const [w, r, c, dr, dc] = e, s = [];
    for (let i = 0; i < w.length; i++) s.push((r+dr*i) + ',' + (c+dc*i));
    return s.sort().join('|');
  };

  function newCrossword(){
    const vw = (window.visualViewport && window.visualViewport.width)  || window.innerWidth;
    const vh = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
    const dp = window.devicePixelRatio || 1;
    const cell = Math.min((Math.min(vw*.92, 360) - 32) / CWC, (vh - 230) / CWR, 30);
    const cw = cell*CWC, ch = cell*CWR;
    cwcv.style.width = cw+'px'; cwcv.style.height = ch+'px';
    cwcv.width = Math.round(cw*dp); cwcv.height = Math.round(ch*dp);
    cwx.setTransform(dp, 0, 0, dp, 0, 0);
    cwx.imageSmoothingQuality = 'high';
    CWG = { cell, cw, ch };
    renderCwWords(); drawCw();
  }

  function renderCwWords(){
    cwWordsE.innerHTML = '';
    CW_WORDS.forEach(e => {
      const s = document.createElement('span');
      s.textContent = e[0];
      if (cwFound.has(e[0])) s.className = 'done';
      cwWordsE.appendChild(s);
    });
    cwStatusE.textContent = cwFound.size === CW_WORDS.length
      ? 'You found them all! \u{1F48D}'
      : cwFound.size + ' / ' + CW_WORDS.length + ' found';
  }

  const cwCenter = (r, c) => ({ x: c*CWG.cell + CWG.cell/2, y: r*CWG.cell + CWG.cell/2 });
  function cwCapsule(r0, c0, r1, c1, color){
    const a = cwCenter(r0, c0), b = cwCenter(r1, c1);
    cwx.save();
    cwx.strokeStyle = color; cwx.lineWidth = CWG.cell*.82; cwx.lineCap = 'round';
    cwx.beginPath(); cwx.moveTo(a.x, a.y); cwx.lineTo(b.x, b.y); cwx.stroke();
    cwx.restore();
  }
  function drawCw(){
    if (!CWG) return;
    const { cell, cw, ch } = CWG;
    cwx.clearRect(0, 0, cw, ch);
    cwx.fillStyle = '#fdfaf1'; cwx.fillRect(0, 0, cw, ch);
    // found words
    CW_WORDS.forEach(e => { if (cwFound.has(e[0]))
      cwCapsule(e[1], e[2], e[1]+e[3]*(e[0].length-1), e[2]+e[4]*(e[0].length-1), 'rgba(154,160,216,.4)'); });
    // active selection
    if (cwSel) cwCapsule(cwSel.r0, cwSel.c0, cwSel.r1, cwSel.c1, 'rgba(203,178,119,.5)');
    // grid lines
    cwx.strokeStyle = '#e7ddc8'; cwx.lineWidth = 1;
    for (let i = 0; i <= CWC; i++){ cwx.beginPath(); cwx.moveTo(i*cell, 0); cwx.lineTo(i*cell, ch); cwx.stroke(); }
    for (let j = 0; j <= CWR; j++){ cwx.beginPath(); cwx.moveTo(0, j*cell); cwx.lineTo(cw, j*cell); cwx.stroke(); }
    // letters
    cwx.fillStyle = '#4a3f33'; cwx.font = `${Math.floor(cell*.58)}px Georgia,serif`;
    cwx.textAlign = 'center'; cwx.textBaseline = 'middle';
    for (let r = 0; r < CWR; r++) for (let c = 0; c < CWC; c++)
      cwx.fillText(CW_GRID[r][c], c*cell + cell/2, r*cell + cell/2 + 1);
  }

  const cwClamp = (v, n) => Math.max(0, Math.min(n-1, v));
  function cwCellAt(e){
    const rect = cwcv.getBoundingClientRect();
    return { r: cwClamp(Math.floor((e.clientY-rect.top)/CWG.cell), CWR),
             c: cwClamp(Math.floor((e.clientX-rect.left)/CWG.cell), CWC) };
  }
  function cwSnap(s, cur){                            // straight line: H, V or diagonal
    const dx = cur.c - s.c, dy = cur.r - s.r, adx = Math.abs(dx), ady = Math.abs(dy);
    let dr, dc, len;
    if (ady <= adx*.4){ dr = 0; dc = Math.sign(dx) || 1; len = adx + 1; }
    else if (adx <= ady*.4){ dc = 0; dr = Math.sign(dy) || 1; len = ady + 1; }
    else { dr = Math.sign(dy); dc = Math.sign(dx); len = Math.min(adx, ady) + 1; }
    return { r0: s.r, c0: s.c, r1: cwClamp(s.r+dr*(len-1), CWR), c1: cwClamp(s.c+dc*(len-1), CWC) };
  }
  function cwCheck(sel){
    const len = Math.max(Math.abs(sel.r1-sel.r0), Math.abs(sel.c1-sel.c0)) + 1;
    const dr = Math.sign(sel.r1-sel.r0), dc = Math.sign(sel.c1-sel.c0), cells = [];
    for (let i = 0; i < len; i++) cells.push((sel.r0+dr*i) + ',' + (sel.c0+dc*i));
    const key = cells.sort().join('|');
    for (const e of CW_WORDS){
      if (!cwFound.has(e[0]) && cwWordKey(e) === key){
        cwFound.add(e[0]); renderCwWords(); break;
      }
    }
  }

  let cwDrag = false, cwStart = null;
  cwcv.addEventListener('pointerdown', e => {
    try { cwcv.setPointerCapture(e.pointerId); } catch(_){}
    cwDrag = true; cwStart = cwCellAt(e);
    cwSel = { r0: cwStart.r, c0: cwStart.c, r1: cwStart.r, c1: cwStart.c }; drawCw();
  });
  cwcv.addEventListener('pointermove', e => { if (cwDrag){ cwSel = cwSnap(cwStart, cwCellAt(e)); drawCw(); } });
  function cwEnd(){ if (!cwDrag) return; cwDrag = false; if (cwSel) cwCheck(cwSel); cwSel = null; drawCw(); }
  cwcv.addEventListener('pointerup', cwEnd);
  cwcv.addEventListener('pointercancel', cwEnd);

  function openCrossword(){ cwOpen = true; cwFound.clear(); cwModal.classList.add('open'); newCrossword(); }
  function closeCrossword(){ cwOpen = false; cwModal.classList.remove('open'); }
  document.getElementById('cwClose').addEventListener('click', closeCrossword);
  cwModal.addEventListener('click', e => { if (e.target === cwModal) closeCrossword(); });
</script>
</body>
</html>
